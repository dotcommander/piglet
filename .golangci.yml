version: "2"

linters:
  disable-all: true
  enable:
    - gofmt
    - goimports
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gosec
    - misspell
    - revive
    - gocritic
    - gocyclo
    - gocognit
    - funlen
    - nestif
    - goconst
    - dupl

linters-settings:
  gocyclo:
    min-complexity: 15
  gocognit:
    min-complexity: 20
  funlen:
    lines: 80
    statements: 50
  nestif:
    min-complexity: 4
  goconst:
    min-count: 3
  dupl:
    threshold: 100

issues:
  exclude-dirs:
    - examples
